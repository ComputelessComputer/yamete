name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish or update, for example v0.2.0"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    env:
      APP_NAME: OpenMoan
      APP_BUNDLE: OpenMoan.app
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate signing secrets
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required secret: $name"
              exit 1
            fi
          done

      - name: Import certificate
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Resolve signing identity
        shell: bash
        run: |
          set -euo pipefail

          IDENTITY="$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | sed -E 's/.*"(.*)"$/\1/')"

          if [[ -z "$IDENTITY" ]]; then
            echo "Developer ID Application identity not found"
            exit 1
          fi

          echo "SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          dmg="${APP_NAME}-${tag}-macos.dmg"
          checksum="${dmg}.sha256"

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "dmg=${dmg}" >> "$GITHUB_OUTPUT"
          echo "checksum=${checksum}" >> "$GITHUB_OUTPUT"
          echo "app_path=dist/${APP_BUNDLE}" >> "$GITHUB_OUTPUT"
          echo "dmg_path=dist/${dmg}" >> "$GITHUB_OUTPUT"

      - name: Build DMG assets
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./scripts/build-release-assets.sh
          chmod +x ./scripts/fetch-spank.sh
          ./scripts/build-release-assets.sh "${{ steps.meta.outputs.tag }}" ./dist

      - name: Sign app bundle
        shell: bash
        run: |
          set -euo pipefail

          SPANK_BIN="${{ steps.meta.outputs.app_path }}/Contents/Resources/spank"
          if [[ -x "$SPANK_BIN" ]]; then
            echo "Signing bundled spank binary..."
            /usr/bin/codesign --force --sign "$SIGNING_IDENTITY" \
              --options runtime \
              --timestamp \
              --verbose \
              "$SPANK_BIN"
          fi

          /usr/bin/codesign --force --sign "$SIGNING_IDENTITY" \
            --options runtime \
            --timestamp \
            --verbose \
            "${{ steps.meta.outputs.app_path }}"

          codesign --verify --strict --deep --verbose=4 "${{ steps.meta.outputs.app_path }}"

      - name: Notarize and staple app bundle
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          ZIP_PATH="$RUNNER_TEMP/${APP_NAME}.zip"
          ditto -c -k --keepParent "${{ steps.meta.outputs.app_path }}" "$ZIP_PATH"

          SUBMIT_OUTPUT="$(xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1)"
          echo "$SUBMIT_OUTPUT"

          if echo "$SUBMIT_OUTPUT" | grep -q "status: Invalid"; then
            SUBMISSION_ID="$(echo "$SUBMIT_OUTPUT" | grep 'id:' | head -1 | awk '{print $2}')"
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID"
            exit 1
          fi

          xcrun stapler staple "${{ steps.meta.outputs.app_path }}"
          spctl -a -vv -t exec "${{ steps.meta.outputs.app_path }}"

      - name: Create DMG from notarized app
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./scripts/create-dmg.sh
          ./scripts/create-dmg.sh "${{ steps.meta.outputs.tag }}" "${{ steps.meta.outputs.app_path }}" ./dist

      - name: Sign DMG
        shell: bash
        run: |
          set -euo pipefail

          /usr/bin/codesign --force --sign "$SIGNING_IDENTITY" \
            --timestamp \
            "${{ steps.meta.outputs.dmg_path }}"

          codesign --verify --verbose=4 "${{ steps.meta.outputs.dmg_path }}"

      - name: Notarize and staple DMG
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          SUBMIT_OUTPUT="$(xcrun notarytool submit "${{ steps.meta.outputs.dmg_path }}" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1)"
          echo "$SUBMIT_OUTPUT"

          if echo "$SUBMIT_OUTPUT" | grep -q "status: Invalid"; then
            SUBMISSION_ID="$(echo "$SUBMIT_OUTPUT" | grep 'id:' | head -1 | awk '{print $2}')"
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID"
            exit 1
          fi

          xcrun stapler staple "${{ steps.meta.outputs.dmg_path }}"
          xcrun stapler validate "${{ steps.meta.outputs.dmg_path }}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ steps.meta.outputs.tag }}
          path: |
            dist/${{ steps.meta.outputs.dmg }}
            dist/${{ steps.meta.outputs.checksum }}

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          DMG: ${{ steps.meta.outputs.dmg }}
          CHECKSUM: ${{ steps.meta.outputs.checksum }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              "dist/${DMG}" \
              "dist/${CHECKSUM}" \
              --clobber
          else
            gh release create "$TAG" \
              "dist/${DMG}" \
              "dist/${CHECKSUM}" \
              --generate-notes \
              --title "$TAG"
          fi
