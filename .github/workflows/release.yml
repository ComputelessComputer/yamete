name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish or update, for example v0.2.0"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    env:
      APP_NAME: openmoan
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          version="${tag#v}"
          archive="${APP_NAME}-${tag}-macos.zip"
          checksum="${archive}.sha256"

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "archive=${archive}" >> "$GITHUB_OUTPUT"
          echo "checksum=${checksum}" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          swift build -c release

      - name: Package artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp ".build/release/${APP_NAME}" "dist/${APP_NAME}"
          ditto -c -k --sequesterRsrc --keepParent "dist/${APP_NAME}" "dist/${{ steps.meta.outputs.archive }}"
          shasum -a 256 "dist/${{ steps.meta.outputs.archive }}" > "dist/${{ steps.meta.outputs.checksum }}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ steps.meta.outputs.tag }}
          path: |
            dist/${{ steps.meta.outputs.archive }}
            dist/${{ steps.meta.outputs.checksum }}

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          ARCHIVE: ${{ steps.meta.outputs.archive }}
          CHECKSUM: ${{ steps.meta.outputs.checksum }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              "dist/${ARCHIVE}" \
              "dist/${CHECKSUM}" \
              --clobber
          else
            gh release create "$TAG" \
              "dist/${ARCHIVE}" \
              "dist/${CHECKSUM}" \
              --generate-notes \
              --title "$TAG"
          fi
