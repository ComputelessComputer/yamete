name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish or update, for example v0.2.0"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    env:
      APP_NAME: OpenMoan
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          dmg="${APP_NAME}-${tag}-macos.dmg"
          checksum="${dmg}.sha256"

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "dmg=${dmg}" >> "$GITHUB_OUTPUT"
          echo "checksum=${checksum}" >> "$GITHUB_OUTPUT"

      - name: Build DMG assets
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./scripts/build-release-assets.sh
          ./scripts/build-release-assets.sh "${{ steps.meta.outputs.tag }}" ./dist

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ steps.meta.outputs.tag }}
          path: |
            dist/${{ steps.meta.outputs.dmg }}
            dist/${{ steps.meta.outputs.checksum }}

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          DMG: ${{ steps.meta.outputs.dmg }}
          CHECKSUM: ${{ steps.meta.outputs.checksum }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              "dist/${DMG}" \
              "dist/${CHECKSUM}" \
              --clobber
          else
            gh release create "$TAG" \
              "dist/${DMG}" \
              "dist/${CHECKSUM}" \
              --generate-notes \
              --title "$TAG"
          fi
